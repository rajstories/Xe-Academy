  </g>

  <!-- wordmark -->
  <text x="430" y="290" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" letter-spacing="10" fill="#ffffff">ACADEMY</text>

  <!-- tagline -->
